<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antonio Martinez - Event Slides (6x2)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --am-navy-dark: #0F1B3D;
            --am-navy: #1E3A8A;
            --am-gold: #F59E0B;
            --am-gold-dark: #D97706;
            --am-white: #FFFFFF;
            --am-gray-100: #F3F4F6;
            --font-heading: 'Montserrat', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: var(--font-body);
            color: var(--am-white);
            gap: 40px;
            padding: 40px;
        }

        /* Slide Container - 6x2 Aspect Ratio (3:1) */
        .slide-container {
            width: 100%;
            max-width: 1800px;
            aspect-ratio: 3 / 1;
            position: relative;
            overflow: hidden;
            display: flex;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        /* ================= SLIDE 1: YOUTUBE (WHITE THEME) ================= */
        .slide-1 {
            background: #FFFFFF;
            color: var(--am-navy-dark);
        }

        .slide-1 .slide-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0;
            /* Full bleed for image if needed, or padded */
        }

        .slide-1 .photo-side {
            flex: 0 0 45%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .slide-1 .real-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
        }

        .slide-1 .content-side {
            flex: 1;
            padding: 4vw 6vw 4vw 2vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        .slide-1 h1 {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 3.5vw;
            line-height: 1.1;
            margin-bottom: 2vw;
            color: var(--am-navy-dark);
        }

        .slide-1 .highlight-gold {
            color: var(--am-gold);
        }

        .slide-1 .cta-row {
            display: flex;
            align-items: center;
            gap: 3vw;
        }

        /* YouTube Logo SVG */
        .yt-logo {
            height: 4vw;
            width: auto;
        }

        .slide-1 .qr-code {
            width: 10vw;
            height: 10vw;
            border: 2px solid var(--am-gray-100);
            border-radius: 1vw;
        }

        .slide-1 .qr-label {
            font-size: 1.2vw;
            color: var(--am-navy);
            margin-top: 0.5vw;
            font-weight: 600;
        }


        /* ================= SLIDE 2: SKOOL (BLUE THEME) ================= */
        .slide-2 {
            background: linear-gradient(135deg, var(--am-navy-dark) 0%, #0a1229 100%);
            color: white;
        }

        .slide-2 .slide-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            padding: 4vw 6vw;
        }

        .slide-2 .left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
        }

        .incruises-logo {
            height: 4vw;
            width: auto;
            margin-bottom: 2vw;
            object-fit: contain;
            filter: brightness(0) invert(1);
            /* Make logo white if it's dark */
        }

        .tono-graphic {
            height: 6vw;
            width: auto;
            margin-bottom: 1.5vw;
            object-fit: contain;
        }

        .slide-2 h2 {
            font-family: var(--font-heading);
            font-size: 3vw;
            font-weight: 800;
            margin-bottom: 0.5vw;
            line-height: 1.2;
        }

        .slide-2 .highlight-gold {
            color: var(--am-gold);
        }

        .slide-2 .right-col {
            flex: 0 0 30%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 2vw;
            border-radius: 2vw;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .slide-2 .qr-large {
            width: 14vw;
            height: 14vw;
            background: white;
            padding: 0.5vw;
            border-radius: 0.8vw;
            margin-bottom: 1.5vw;
        }

        .slide-2 .instruction-text {
            text-align: center;
        }

        .slide-2 .part-text {
            font-family: var(--font-heading);
            font-size: 1.2vw;
            font-weight: 700;
            color: var(--am-gold);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .slide-2 .sub-text {
            font-size: 1vw;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.5vw;
        }

        /* Helper for separation labels */
        .slide-label {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            color: #fff;
            z-index: 10;
        }
    </style>
</head>

<body>

        <div class="slide-content">

                <img src="/Users/niko/Desktop/Antonio Martinez /Fotos/IMG_2510.JPG" class="real-image"
                    alt="Antonio Martinez">

            <div class="content-side">

                    </g>
                </svg>

                <h1>Sígueme en YouTube para<br>ganarte <span class="highlight-gold">$2,000 USD</span></h1>

                <div class="cta-row">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://www.youtube.com/@AntonioMartinez.47"
                        alt="QR YouTube" class="qr-code">
                    <div style="display: flex; flex-direction: column; justify-content: flex-start;">
                        <span
                            style="font-size: 1.5vw; font-weight: 500; color: var(--am-navy); max-width: 25vw;">Escanea
                            para suscribirte al canal oficial</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SLIDE 2: SKOOL (BLUE) -->
    <div class="slide-container slide-2">
        <div class="slide-label">SLIDE 2 (Blue)</div>
        <div class="slide-content">
            <div class="left-col">
                <!-- INCRUISES LOGO -->
                <img src="/Users/niko/Desktop/Antonio Martinez /Fotos/incruises_logo.png" class="incruises-logo"
                    alt="InCruises Logo">

                <!-- TOÑO TEXT/GRAPHIC -->
                <img src="/Users/niko/Desktop/Antonio Martinez /Fotos/Toño Martinez.png" class="tono-graphic"
                    alt="Toño Martinez">

                <h2>Arranque Rápido en InCruises</h2>
                <h2 style="font-weight: 400; font-size: 2vw; margin-top: 1vw;">Escanea para acceder a la <span

            </div>

            <div class="right-col">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://www.skool.com/incruises-con-tono-martinez-4293/about?ref=a59b08725ce54a38804683454e59709f"

                    <div class="part-text">Parte 1 Disponible</div>
                    <div class="sub-text">Parte 2 próximamente</div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
